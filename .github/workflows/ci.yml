# The base build and publish jobs are generated by sbt-github-actions.
# The reusable native job and its trigger are maintained in this file.

name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
    tags: [v*]
  workflow_dispatch:
    inputs:
      build_native_executable:
        description: Build the native executables
        required: true
        default: false
        type: boolean

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [all]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Build project and docs
        run: sbt 'test; docs/docusaurusCreateSite'

  native:
    name: Build Native Executables
    if: >-
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'pull_request' && github.event.pull_request.number == 270) ||
      (github.event_name == 'workflow_dispatch' && inputs.build_native_executable)
    uses: ./.github/workflows/native-image.yml

  publish:
    name: Publish Artifacts
    needs: [build, native]
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v'))
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [2.13.18]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Download native executables
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: dist
          merge-multiple: true

      - name: Validate native executables
        run: |
          test "$(find dist -maxdepth 1 -type f ! -name '*.sha256' | wc -l)" -eq 3
          test "$(find dist -maxdepth 1 -type f -name '*.sha256' | wc -l)" -eq 3
          for checksum in dist/*.sha256; do (cd dist && sha256sum -c "$(basename "$checksum")"); done

      - name: Publish artifacts
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: sbt ci-release

      - name: Attach native executables to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber

      - name: Publish docs
        env:
          GIT_USER_NAME: github-actions[bot]
          CURRENT_BRANCH: ${{ github.ref_name }}
          GIT_USER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_PASS: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER: github-actions[bot]
        run: sbt docs/docusaurusPublishGhpages
